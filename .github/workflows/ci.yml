name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest

  native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build --config Release
      - run: ctest --test-dir build --build-config Release --output-on-failure

  symbols-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: extensions/fastdis-symbols-proof/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: npm ci --prefix extensions/fastdis-symbols-proof --cache build/npm-cache
      - run: python -m pytest tests/test_symbols_proof.py

  build-python-sdist-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*

  build-windows-ctypes-wheel:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip build wheel
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build --config Release
      - run: python tools/build_ctypes_wheel.py --native-lib build/Release/fastdis.dll --plat-name win_amd64 --outdir dist --no-isolation
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: python -c "import fastdis.native as n; print(n.find_native_library()); print(n.load_native().abi_version())"
