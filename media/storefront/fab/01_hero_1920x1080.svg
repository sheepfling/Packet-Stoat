<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">FastDIS packet burst to engine-ready state</title>
  <desc id="desc">A storefront hero graphic showing DIS packet bursts flowing through the FastDIS C ABI into engine-ready snapshots and optional tactical symbol overlays.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06131b"/>
      <stop offset="0.55" stop-color="#0d2630"/>
      <stop offset="1" stop-color="#142118"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102b36"/>
      <stop offset="1" stop-color="#0a171f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title{font-family:Verdana,DejaVu Sans,sans-serif;font-size:104px;font-weight:800;fill:#f3f7ea;letter-spacing:-3px}
      .sub{font-family:Verdana,DejaVu Sans,sans-serif;font-size:32px;fill:#cfe2d3}
      .label{font-family:Verdana,DejaVu Sans,sans-serif;font-size:28px;font-weight:700;fill:#f2f6e8}
      .small{font-family:Verdana,DejaVu Sans,sans-serif;font-size:22px;fill:#a9c7bd}
      .mono{font-family:Menlo,Consolas,monospace;font-size:20px;fill:#94f3c4}
      .badge{fill:#d2f36b;stroke:#f1ffc0;stroke-width:2}
      .line{stroke:#6df0c2;stroke-width:7;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .grid{stroke:#264a54;stroke-width:2}
      .card{fill:url(#card);stroke:#3d6b74;stroke-width:2}
    </style>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <g opacity="0.34">
    <path class="grid" d="M0 820 H1920 M0 900 H1920 M0 980 H1920 M0 740 H1920"/>
    <path class="grid" d="M1160 250 L1860 900 M1320 220 L1920 780 M1000 310 L1740 1030 M1500 220 L1920 600"/>
  </g>
  <text x="92" y="150" class="title">FastDIS</text>
  <text x="98" y="204" class="sub">High-rate DIS packet scanning for engine runtimes</text>
  <g transform="translate(96 310)">
    <rect class="card" width="430" height="344" rx="28"/>
    <text x="34" y="56" class="label">DIS packet burst</text>
    <text x="34" y="104" class="mono">07 03 01 01 10 00 ...</text>
    <text x="34" y="142" class="mono">PDU Header</text>
    <text x="34" y="180" class="mono">Entity State</text>
    <text x="34" y="218" class="mono">Snapshot input</text>
    <g fill="#6df0c2" opacity="0.9">
      <circle cx="340" cy="92" r="12"/>
      <circle cx="374" cy="138" r="12"/>
      <circle cx="324" cy="196" r="12"/>
      <circle cx="386" cy="246" r="12"/>
    </g>
  </g>
  <path class="line" filter="url(#glow)" d="M560 480 C690 480 710 480 824 480"/>
  <g transform="translate(824 268)">
    <rect class="card" width="420" height="426" rx="34"/>
    <text x="54" y="72" class="label">FastDIS C ABI</text>
    <text x="54" y="128" class="small">filter early</text>
    <text x="54" y="174" class="small">decode Entity State prefix</text>
    <text x="54" y="220" class="small">update native entity table</text>
    <text x="54" y="266" class="small">publish changed snapshots</text>
    <rect x="54" y="320" width="96" height="38" rx="19" class="badge"/>
    <text x="79" y="346" font-family="Verdana,DejaVu Sans,sans-serif" font-size="20" font-weight="800" fill="#152113">C ABI</text>
    <rect x="170" y="320" width="162" height="38" rx="19" class="badge"/>
    <text x="191" y="346" font-family="Verdana,DejaVu Sans,sans-serif" font-size="20" font-weight="800" fill="#152113">Snapshots</text>
  </g>
  <path class="line" filter="url(#glow)" d="M1268 480 C1398 480 1416 480 1518 480"/>
  <g transform="translate(1518 290)">
    <rect class="card" width="304" height="382" rx="30"/>
    <text x="36" y="58" class="label">Engine scene</text>
    <g transform="translate(48 94)">
      <path d="M0 210 L98 18 L206 210 Z" fill="#0c1b23" stroke="#4b7a86" stroke-width="3"/>
      <circle cx="58" cy="154" r="15" fill="#d2f36b"/>
      <circle cx="118" cy="92" r="15" fill="#6df0c2"/>
      <circle cx="154" cy="176" r="15" fill="#f7d46b"/>
      <text x="22" y="244" class="small">Track A12</text>
      <text x="22" y="278" class="small">Demo Entity</text>
    </g>
  </g>
  <text x="98" y="920" class="sub">C ABI core • Entity State fast path • Unreal / Godot / Unity snapshots • Optional symbols extension</text>
</svg>
