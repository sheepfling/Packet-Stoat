<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">FastDIS MIL-STD-2525 handoff proof</title>
  <desc id="desc">A visual proof chain from synthetic Entity State PDU to FastDIS prefix parse to symbol descriptor to SIDC modifiers to milsymbol SVG output.</desc>
  <rect width="1920" height="1080" fill="#07151d"/>
  <style>
    .h{font-family:Verdana,DejaVu Sans,sans-serif;font-size:68px;font-weight:800;fill:#f3f7ea}
    .t{font-family:Verdana,DejaVu Sans,sans-serif;font-size:26px;font-weight:800;fill:#edf6df}
    .s{font-family:Verdana,DejaVu Sans,sans-serif;font-size:20px;fill:#b8d2c4}
    .mono{font-family:Menlo,Consolas,monospace;font-size:18px;fill:#94f3c4}
    .box{fill:#102936;stroke:#47717b;stroke-width:3}
    .proof{fill:#0b1a20;stroke:#6df0c2;stroke-width:4}
    .arrow{stroke:#6df0c2;stroke-width:6;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#6df0c2"/></marker>
  </defs>
  <text x="96" y="126" class="h">MIL-STD-2525 handoff proof</text>
  <text x="102" y="174" class="s">Entity State identity fields drive a sibling symbol adapter; renderers stay outside core.</text>
  <g transform="translate(84 260)">
    <rect class="box" width="250" height="170" rx="22"/><text x="28" y="54" class="t">Entity State PDU</text><text x="28" y="94" class="mono">force_id=1</text><text x="28" y="126" class="mono">entity_type=1.1...</text>
  </g>
  <path class="arrow" d="M350 345 H486"/>
  <g transform="translate(506 260)">
    <rect class="box" width="284" height="170" rx="22"/><text x="28" y="54" class="t">FastDIS parse</text><text x="28" y="94" class="s">entity_state_prefix</text><text x="28" y="126" class="s">marking + pose</text>
  </g>
  <path class="arrow" d="M806 345 H942"/>
  <g transform="translate(962 260)">
    <rect class="box" width="300" height="170" rx="22"/><text x="28" y="54" class="t">SymbolDescriptor</text><text x="28" y="94" class="s">affiliation policy</text><text x="28" y="126" class="s">symbol key fallback</text>
  </g>
  <path class="arrow" d="M1278 345 H1414"/>
  <g transform="translate(1434 260)">
    <rect class="box" width="330" height="170" rx="22"/><text x="28" y="54" class="t">milsymbol</text><text x="28" y="94" class="s">SIDC + modifiers</text><text x="28" y="126" class="s">SVG output</text>
  </g>
  <text x="104" y="548" class="t">Rendered proof contact sheet</text>
  <g transform="translate(112 600)">
    <g transform="translate(0 0)"><rect class="proof" width="260" height="260" rx="28"/><path d="M130 50 L190 130 L130 210 L70 130 Z" fill="#d2f36b"/><text x="58" y="238" class="s">friendly land</text></g>
    <g transform="translate(310 0)"><rect class="proof" width="260" height="260" rx="28"/><path d="M130 50 L190 130 L130 210 L70 130 Z" fill="#ff6b5f"/><text x="66" y="238" class="s">hostile land</text></g>
    <g transform="translate(620 0)"><rect class="proof" width="260" height="260" rx="28"/><path d="M70 150 C100 70 160 70 190 150 Z" fill="#f7d46b"/><text x="70" y="238" class="s">neutral air</text></g>
    <g transform="translate(930 0)"><rect class="proof" width="260" height="260" rx="28"/><path d="M80 160 C120 110 160 110 200 160 C170 188 110 188 80 160 Z" fill="#8fa8b7"/><text x="40" y="238" class="s">unknown subsurface</text></g>
    <g transform="translate(1240 0)"><rect class="proof" width="260" height="260" rx="28"/><circle cx="130" cy="130" r="68" fill="#9db4c0"/><text x="54" y="238" class="s">unmapped fallback</text></g>
  </g>
  <text x="112" y="958" class="s">Disposable proof harness: 5 demo mappings rendered through milsymbol. Prototype handoff, not production-ready.</text>
</svg>
