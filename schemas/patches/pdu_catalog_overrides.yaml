# FastDIS PDU catalog override policy.
#
# Generated files must not be edited directly. Known standard/XML mismatches are
# recorded here and enforced by tools/generate_pdu_coverage.py.

pdu_overrides:
  - version: 7
    pdu_type: 72
    name: Attribute
    class_name: AttributePdu
    schema_status: PRESENT_BUT_MISSING_PDU_TYPE_INITIAL_VALUE
    reason: DIS7.xml contains AttributePdu but the class has no explicit pduType initialValue.

aliases:
  - pdu_type: 28
    dis6_name: IFF/ATC/NAVAIDS
    dis7_name: IFF
    translation_status: RENAMED
  - pdu_type: 35
    dis6_name: Transfer Control
    dis7_name: Transfer Ownership
    translation_status: RENAMED

schema_gaps:
  - version: 7
    pdu_type: 70
    name: Information Operations Action
    status: ENUM_ONLY
    reason: Present in the DIS 7 PDU enum target but absent from checked-in DIS7.xml.
  - version: 7
    pdu_type: 71
    name: Information Operations Report
    status: ENUM_ONLY
    reason: Present in the DIS 7 PDU enum target but absent from checked-in DIS7.xml.
