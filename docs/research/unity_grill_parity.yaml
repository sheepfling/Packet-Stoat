schema: fastdis.unity_grill_parity_matrix.v1
baseline:
  product: GRILL DIS for Unity
  repository: AF-GRILL/DISPluginForUnity
  observed_commit: e362bb477cc84806db783830443974db70284f8b
  asset_store_version: pin-required
  unity_version: 2020.3.26f1
milestones:
